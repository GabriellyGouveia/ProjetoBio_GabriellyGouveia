    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <header>
        <div class="logo-area">
            <h1>Gg</h1>
        </div>
        <button id="menu-hamburguer">☰</button>
        <nav id="nav-menu">
            <ul>
                <li><a href="index.html">Início</a></li>
                <li><a href="sobre-mim.html">Sobre Mim</a></li>
                <li><a href="habilidades.html">Habilidades</a></li>
                <li><a href="projetos.html">Projetos</a></li>
                <li><a href="contato.html">Contato</a></li>
            </ul>
        </nav>
    </header>

    <main>
        <section id="contato">
            <div class="conteudo-secao contato-container">
                <div class="contato-info">
                    <h1 class="logo-grande">Gg</h1>
                    <div class="redes-links">
                        <a href="https://www.linkedin.com/in/gabriellygouveia/" target="_blank">LinkedIn</a>
                        <a href="https://github.com/GabriellyGouveia" target="_blank">GitHub</a>
                    </div>
                </div>
                
                <form id="form-contato" class="form-estilizado" action="https://formsubmit.co/gabriellygouveiaa@gmail.com" method="POST">
                    <div>
                        <label for="nome">Nome:</label>
                        <input type="text" id="nome" name="nome" placeholder="Seu nome" required>
                    </div>
                    <div>
                        <label for="email">E-mail:</label>
                        <input type="email" id="email" name="email" placeholder="Seu e-mail" required>
                    </div>
                    <div>
                        <label for="mensagem">Mensagem:</label>
                        <textarea id="mensagem" name="mensagem" rows="4" placeholder="Escreva sua mensagem aqui..." required></textarea>
                    </div>
                    <button type="submit">Enviar Mensagem</button>
                </form>
            </div>
        </section>
    </main>

    <footer>
        <p>&copy; <span id="ano-atual"></span> Gabrielly Gouveia Da Silva Feitosa. Todos os direitos reservados.</p>
    </footer>

    <script src="js/script.js"></script>
</body>

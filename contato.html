<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <!-- Configuração de caracteres -->
    <meta charset="UTF-8">

    <!-- Responsividade -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- Título da página -->
    <title>Contato - Gg</title>

    <!-- Fontes do Google -->
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

    <!-- CSS principal -->
    <link rel="stylesheet" href="css/style.css">
</head>

<body>
    <header>
        <!-- Logo -->
        <div class="logo-area">
            <h1>Gg</h1>
        </div>

        <!-- Botão do menu hamburguer -->
        <button id="menu-hamburguer">☰</button>

        <!-- Navegação -->
        <nav id="nav-menu">
            <ul>
                <li><a href="index.html">Início</a></li>
                <li><a href="sobre-mim.html">Sobre Mim</a></li>
                <li><a href="habilidades.html">Habilidades</a></li>
                <li><a href="projetos.html">Projetos</a></li>
                <li><a href="contato.html">Contato</a></li>
            </ul>
        </nav>
    </header>

    <main>
        <!-- Seção de contato -->
        <section id="contato">
            <div class="conteudo-secao contato-container">

                <!-- Parte com informações e links -->
                <div class="contato-info">
                    <!-- Logo maior como destaque visual -->
                    <h1 class="logo-grande">Gg</h1>

                    <!-- Links para redes -->
                    <div class="redes-links">
                        <a href="https://www.linkedin.com/in/gabriellygouveia/" target="_blank">LinkedIn</a>
                        <a href="https://github.com/GabriellyGouveia" target="_blank">GitHub</a>
                    </div>
                </div>
                
                <!-- Formulário de contato -->
                <form 
                    id="form-contato" 
                    class="form-estilizado" 
                    action="https://formsubmit.co/gabriellygouveiaa@gmail.com" 
                    method="POST"
                >
                    <!-- Campo nome -->
                    <div>
                        <label for="nome">Nome:</label>
                        <input 
                            type="text" 
                            id="nome" 
                            name="nome" 
                            placeholder="Seu nome" 
                            required
                        >
                    </div>

                    <!-- Campo email -->
                    <div>
                        <label for="email">E-mail:</label>
                        <input 
                            type="email" 
                            id="email" 
                            name="email" 
                            placeholder="Seu e-mail" 
                            required
                        >
                    </div>

                    <!-- Campo mensagem -->
                    <div>
                        <label for="mensagem">Mensagem:</label>
                        <textarea 
                            id="mensagem" 
                            name="mensagem" 
                            rows="4" 
                            placeholder="Escreva sua mensagem aqui..." 
                            required
                        ></textarea>
                    </div>

                    <!-- Botão de envio -->
                    <button type="submit">Enviar Mensagem</button>
                </form>
            </div>
        </section>
    </main>

    <footer>
        <!-- Rodapé padrão -->
        <p>
            &copy; <span id="ano-atual"></span> 
            Gabrielly Gouveia Da Silva Feitosa. 
            Todos os direitos reservados.
        </p>
    </footer>

    <!-- Script JS -->
    <script src="js/script.js"></script>
</body>
</html>
